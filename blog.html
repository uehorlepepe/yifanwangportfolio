<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yifan Wang</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        ::selection {
            background: var(--accent);
            color: #000;
        }

        .button-wrapper {
            width: 100%;
            flex-shrink: 0;
        }

        .item-meta-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.5rem;
        }

        .item-meta {
            margin-bottom: 0;
        }

        .photo-stack {
            width: 100%;
            max-width: 320px;
            max-height: 400px;
            margin: 0 auto 0 -28px;
            position: relative;
            aspect-ratio: 4 / 5;
        }

        .stack-img {
            position: absolute;
            inset: 0;
            width: min(130%, 600px);
            height: 100%;
            object-fit: cover;
            object-position: left center;
            opacity: 0;
            transition: opacity 0.6s ease;
            border: 6px solid #33E5FF;
            border-radius: 22px;
            box-shadow:
                0 0 12px rgba(0, 229, 255, 0.65),
                0 0 28px rgba(0, 229, 255, 0.45),
                0 0 48px rgba(0, 229, 255, 0.25),
                0 18px 50px rgba(0, 229, 255, 0.12);

        }

        .stack-img.active {
            opacity: 1;
        }

        :root {
            --bg: #000000;
            --surface: #000000;
            --surface-2: #000000;
            --ink: #F2F2F2;
            --muted: #9A9A9A;
            --rule: rgba(255, 255, 255, 0.08);
            --accent: #33CCFF;
            --accent-alt: #00FFFF;
            --accent-soft: rgba(51, 204, 255, 0.12);
            --link: #33CCFF;
            --white: #FFFFFF;
            --sans: 'Instrument Sans', sans-serif;
            --serif: 'Instrument Serif', serif;
            --nav-btn-h: 34px;
            --nav-btn-font: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            scrollbar-gutter: stable;
        }

        body {
            font-family: var(--sans);
            background:
                radial-gradient(circle at top left, rgba(51, 204, 255, 0.08), transparent 35%),
                radial-gradient(circle at bottom right, rgba(0, 255, 255, 0.05), transparent 40%),
                var(--bg);
            color: var(--ink);
            line-height: 1.7;
            font-size: 14px;
            padding-top: 85px;
        }

        nav {
            position: fixed;
            inset: 0 0 auto 0;

            display: flex;
            align-items: center;

            padding: 0.95rem 2.5rem;

            border-bottom: 1px solid var(--rule);
            background: rgba(18, 18, 18, 0.75);
            backdrop-filter: blur(14px);

            z-index: 100;
        }

        /* group everything tightly on the right */
        .nav-pill-btns {
            display: flex;
            gap: 0.5rem;
            margin-left: auto;
            /* 🔥 THIS is the key fix */
            align-items: center;
        }

        .nav-inner {
            width: min(1120px, calc(100vw - 3rem));
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0 auto;
        }

        .nav-name {
            font-family: "Space Grotesk", sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .section-nav-btns {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .section-nav-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 34px;
            padding: 0 1rem;
            border-radius: 999px;
            font-size: 12px;
            font-family: var(--sans);
            font-weight: 500;
            text-decoration: none;
            border: 1px solid rgba(51, 229, 255, 0.18);
            color: var(--ink);
            background: rgba(10, 12, 18, 0.35);
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        /* BASE HOVER (IDENTICAL TO BLOG) */
        .section-nav-btn:hover {
            transform: translateY(-3px);

            border-color: #33E5FF;

            box-shadow:
                0 0 0 1px rgba(51, 229, 255, 0.25),
                0 0 12px rgba(51, 229, 255, 0.35),
                0 0 28px rgba(51, 229, 255, 0.25),
                0 0 50px rgba(51, 229, 255, 0.15);

            color: var(--accent);
            background: rgba(51, 229, 255, 0.05);
        }

        /* FEATURED (BLOG VERSION) */
        .section-nav-btn.featured {
            border: 1px solid var(--accent);
            color: var(--accent);
            font-weight: 600;
        }

        .section-nav-btn.featured:hover {
            transform: translateY(-3px);

            border-color: #33E5FF;

            box-shadow:
                0 0 0 1px rgba(51, 229, 255, 0.25),
                0 0 14px rgba(51, 229, 255, 0.35),
                0 0 32px rgba(51, 229, 255, 0.25),
                0 0 70px rgba(51, 229, 255, 0.12);

            background: rgba(51, 229, 255, 0.06);
        }

        /* ── HERO GRID ── */
        .hero-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.3fr) minmax(300px, 420px);
            gap: 3rem;
            align-items: start;
        }

        #hero {
            width: min(1120px, calc(100vw - 3rem));
            margin: 0 auto;
        }

        .hero-copy {
            max-width: 720px;
        }

        .hero-eyebrow {
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 1.25rem;
        }

        #hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(48px, 7vw, 78px);
            font-weight: 600;
            line-height: 0.98;
            letter-spacing: -0.03em;
            margin-bottom: 1.5rem;
        }

        #hero h1 em {
            color: rgba(51, 229, 255, 0.9);
            font-weight: 500;
        }

        .hero-desc {
            max-width: 680px;
            font-size: 17px;
            /* slightly tighter */
            color: rgba(242, 242, 242, 0.75);
            /* less washed out than var(--muted) */
            line-height: 1.85;
            margin-bottom: 1.5rem;
            font-weight: 400;
        }

        /* These replaced the old hero-actions buttons */
        .hero-text-links {
            display: flex;
            gap: 1.6rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .hero-text-link {
            color: var(--link);
            font-size: 14px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .hero-text-link:hover {
            text-decoration: underline;
        }



        .hero-photo-card {
            width: min(100%, 800px);
            justify-self: end;
            overflow: visible;
            background: transparent;
            padding: 0;
            border-radius: 0;
            box-shadow: none;
        }

        .hero-photo,
        .photo-placeholder {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 4 / 5;
            border-radius: 16px;
        }

        .hero-photo {
            object-fit: cover;
            background: linear-gradient(180deg, #e8ece7, #d9dfd8);

        }

        .photo-placeholder {
            display: none;
            min-height: 100%;
            place-content: center;
            place-items: center;
            text-align: center;
            padding: 1.25rem;
            color: var(--muted);
            background: linear-gradient(180deg, #f9f8f4, #eeede7);
        }

        .photo-placeholder code {
            background: rgba(255, 255, 255, 0.86);
            border: 1px solid var(--rule);
            border-radius: 6px;
            padding: 2px 6px;
        }

        .section {
            width: min(1120px, calc(100vw - 2rem));
            margin: 0 auto;
            padding-top: 5rem;
            padding-bottom: 3.5rem;
            scroll-margin-top: 120px;
        }

        #blog.section {
            padding-top: 2rem;
        }

        /* EXTRA SPACING CONTROL */
        #hero {
            padding-bottom: 2rem;
        }

        #research {
            padding-top: 8rem;
            padding-bottom: 2rem;
        }

        #projects {
            padding-top: 2rem;
            padding-bottom: 2rem;
        }

        #skills {
            padding-top: 2rem;
        }

        .section-label {
            font-size: 13px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 600;

            margin-bottom: 2.2rem;
            padding-bottom: 0.9rem;

            position: relative;
        }

        /* Bigger, more interesting header for main sections */
        .blog-header {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 72px;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 0.95;
            margin-bottom: 2.2rem;

            background: linear-gradient(135deg, var(--accent), #70EDFF, var(--accent-alt));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            /* subtle glow to make it pop */
            filter: drop-shadow(0 0 10px rgba(51, 229, 255, 0.25));
        }

        .research-item {
            background: rgba(10, 12, 18, 0.55);
            border: 1px solid rgba(51, 229, 255, 0.25);
            border-radius: 18px;
            padding: 1.5rem;

            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            color: var(--ink);

            transition: all 0.25s ease;
            position: relative;
        }

        .research-list {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* hover = neon activation */
        .research-item:hover {
            transform: translateY(-4px);

            border-color: #33E5FF;

            box-shadow:
                0 0 0 1px rgba(51, 229, 255, 0.25),
                0 0 12px rgba(51, 229, 255, 0.35),
                0 0 28px rgba(51, 229, 255, 0.25),
                0 0 50px rgba(51, 229, 255, 0.15);
        }

        .item-meta {
            font-size: 11px;
            color: var(--muted);
            margin: 0;
            line-height: 1;
        }

        .item-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            font-size: 22px;
            line-height: 1.3;
            letter-spacing: -0.01em;
            margin-bottom: 0.6rem;
        }

        .item-desc {
            font-size: 15px;
            color: var(--muted);
            margin-bottom: 0.875rem;
            max-width: 76ch;
        }

        .item-link {
            color: var(--link);
            font-size: 12px;
            text-decoration: none;
        }

        .research-badge {
            position: static;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;

            padding: 4px 10px;
            border-radius: 999px;

            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .research-badge::before {
            content: "";
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 6px currentColor;
        }

        .badge-published::before {
            animation: pulse-glow 2.2s infinite ease-in-out;
        }

        .badge-review {
            color: #33E5FF;
            background: rgba(51, 229, 255, 0.08);
            border: 1px solid rgba(51, 229, 255, 0.25);
        }

        /* GREEN = published */
        .badge-published {
            color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .project-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 999px;
            white-space: nowrap;
        }

        .project-badge::before {
            content: "";
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;

            box-shadow: 0 0 6px currentColor;
        }

        /* LIVE = cyan */
        .badge-live {
            color: #33E5FF;
            background: rgba(51, 229, 255, 0.08);
        }

        /* IN PROGRESS = amber */
        .badge-progress {
            color: #FFD166;
            background: rgba(255, 209, 102, 0.08);
        }

        /* CONCEPT = muted */
        .badge-concept {
            color: #888;
            background: rgba(255, 255, 255, 0.05);
        }

        @keyframes pulse-glow {
            0% {
                box-shadow: 0 0 4px currentColor;
                opacity: 0.8;
            }

            50% {
                box-shadow: 0 0 10px currentColor;
                opacity: 1;
            }

            100% {
                box-shadow: 0 0 4px currentColor;
                opacity: 0.8;
            }
        }

        /* apply animation */
        .badge-live::before,
        .badge-progress::before {
            animation: pulse-glow 2.2s infinite ease-in-out;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
        }

        .project-card {
            background: rgba(10, 12, 18, 0.55);
            border: 1px solid rgba(51, 229, 255, 0.18);
            border-radius: 18px;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 1rem;
            min-height: 260px;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        }

        .project-card {
            position: relative;
        }

        .project-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 18px;
            pointer-events: none;

            box-shadow: inset 0 0 40px rgba(51, 229, 255, 0.05);
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-card:hover {
            transform: translateY(-5px);

            border-color: rgba(51, 229, 255, 0.5);

            box-shadow:
                0 0 0 1px rgba(51, 229, 255, 0.25),
                0 0 14px rgba(51, 229, 255, 0.35),
                0 0 32px rgba(51, 229, 255, 0.25),
                0 0 70px rgba(51, 229, 255, 0.12);
        }

        .project-card-tag {
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.45rem;
        }

        .project-card-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            font-size: 20px;
            letter-spacing: -0.01em;
            margin-bottom: 0.5rem;
        }

        .project-card-desc {
            font-size: 14px;
            color: var(--muted);
            flex: 1;
        }

        .project-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid var(--rule);
        }

        .project-link-btn,
        .project-launch-btn {
            color: var(--link);
            font-size: 12px;
            text-decoration: none;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            font-family: var(--sans);
        }

        /* ── SKILLS SECTION ── */
        /*
  NEW section — 4 cards in a row, each with:
  logo + skill name + duration + bullet list
*/
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 1rem;
        }

        .skill-card {
            background: rgba(10, 12, 18, 0.55);
            border: 1px solid rgba(51, 229, 255, 0.18);
            border-radius: 18px;
            padding: 1.5rem;

            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            display: flex;
            flex-direction: column;
            gap: 0.75rem;

            transition: all 0.25s ease;
            position: relative;
        }

        .skill-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 18px;
            pointer-events: none;

            box-shadow: inset 0 0 40px rgba(51, 229, 255, 0.05);
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .skill-card:hover::before {
            opacity: 1;
        }

        .skill-card:hover {
            transform: translateY(-5px);

            border-color: rgba(51, 229, 255, 0.5);

            box-shadow:
                0 0 0 1px rgba(51, 229, 255, 0.25),
                0 0 14px rgba(51, 229, 255, 0.35),
                0 0 32px rgba(51, 229, 255, 0.25),
                0 0 70px rgba(51, 229, 255, 0.12);
        }

        .skill-logo {
            font-size: 28px;
            line-height: 1;
        }

        .skill-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 19px;
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .skill-duration {
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 600;
        }

        .skill-bullets {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-top: 0.25rem;
        }

        .skill-bullets li {
            font-size: 13px;
            color: var(--muted);
            padding-left: 1rem;
            position: relative;
        }

        .skill-bullets li::before {
            content: '·';
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: 700;
        }

        .site-footer {
            border-top: 1px solid var(--rule);
            padding: 2rem 0;
            margin-top: 2rem;
        }

        /* ── MAGAZINE LAYOUT ── */
        .magazine-container {
            width: min(1000px, calc(100vw - 2rem));
            margin: 0 auto;
        }

        .featured-post {
            position: relative;
            margin-bottom: 3rem;
            cursor: pointer;
            padding: 1.5rem 2rem;
            /* margin-left/right -2rem to account for new padding if needed, 
         but we want the border to be slightly outside the content */
            border-radius: 16px;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .featured-post::before,
        .grid-post::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 16px;
            padding: 1px;
            background: linear-gradient(to bottom, rgba(51, 229, 255, 0.25), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            transition: background 0.4s ease;
        }

        .featured-post:hover::before,
        .grid-post:hover::before {
            background: linear-gradient(to bottom, var(--accent), transparent);
        }

        .featured-post:hover,
        .grid-post:hover {
            background: rgba(51, 229, 255, 0.04);
            transform: translateY(-6px);
            box-shadow:
                0 20px 40px -20px rgba(51, 229, 255, 0.15),
                0 0 20px rgba(51, 229, 255, 0.05);
        }

        .featured-meta {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1rem;
        }

        .category-label {
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.05em;
        }

        .post-time {
            color: var(--muted);
            font-size: 13px;
        }

        .placeholder-img {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--rule);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 14px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .placeholder-img::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent, rgba(51, 204, 255, 0.05), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .featured-post:hover .placeholder-img::after,
        .grid-post:hover .placeholder-img::after {
            transform: translateX(100%);
        }



        .featured-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(32px, 5vw, 56px);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
            color: var(--ink);
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem 1.5rem;
            margin-bottom: 4rem;
        }

        .grid-post {
            position: relative;
            cursor: pointer;
            padding: 1.25rem 1.5rem;
            border-radius: 16px;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }



        .grid-post .placeholder-img {
            aspect-ratio: 3 / 2;
            margin-bottom: 1rem;
        }

        .grid-post-meta {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .grid-post-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 600;
            line-height: 1.3;
            color: var(--ink);
        }

        @media (max-width: 900px) {
            .posts-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .posts-grid {
                grid-template-columns: 1fr;
            }

            .featured-title {
                font-size: 28px;
            }
        }

        .footer-inner {
            width: min(1120px, calc(100vw - 3.5rem));
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .footer-copy {
            font-size: 12px;
            color: var(--muted);
        }

        .footer-icons {
            display: flex;
            gap: 0.75rem;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .footer-icon-link {
            width: 42px;
            height: 42px;
            border-radius: 50%;

            border: 1px solid rgba(51, 229, 255, 0.25);
            background: transparent;

            display: flex;
            align-items: center;
            justify-content: center;

            text-decoration: none;
            color: var(--ink);

            transition: all 0.2s ease;
        }

        .footer-status {
            font-size: 12px;
            color: var(--muted);

    <script>
        const posts = [
            {
                category: "Life • Productivity",
                title: "The Random Number Strategy: Overcoming Procrastination",
                date: "2026-04-06T11:00:00",
                desc: "How a simple random number generator helped me eliminate decision fatigue and overcome chronic procrastination.",
                link: "blog-productivity.html",
                image: "images/productivity.jpg"
            },
            {
                category: "Aerospace • Engineering",
                title: "Unpacking the Uncertainty: Lessons from My First RC Build",
                date: "2026-04-13T21:00:00",
                desc: "What building an experimental RC aircraft taught me about the gap between theoretical sketches and physical reality.",
                link: "blog-rc-prototype.html",
                image: "images/rcplane.jpg"
            },
            {
                category: "AI & ML • Research",
                title: "Why Perfect Data is the Enemy of Realistic Machine Learning",
                date: "2026-04-20T20:40:00",
                desc: "How a near-perfect R² value of 0.9998 led me to a critical discovery about synthetic data, overfitting, and the necessity of real-world noise.",
                link: "blog-ml-efficiency.html",
                image: "images/r2.png",
                contain: true
            }
        ];

        function formatTime(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diffInMs = now - date;
            const diffInMins = Math.floor(diffInMs / (1000 * 60));
            const diffInHours = Math.floor(diffInMins / 60);
            const diffInDays = Math.floor(diffInHours / 24);

            if (diffInMs < 0) return `Just posted`;
            if (diffInMins < 60) return `Posted ${diffInMins} minutes ago`;
            if (diffInHours < 24) return `Posted ${diffInHours} hours ago`;
            return `Posted ${diffInDays} days ago`;
        }

        const featuredContainer = document.getElementById("featuredPost");
        const gridContainer = document.getElementById("gridPosts");

        // Sort by newest first
        posts.sort((a, b) => new Date(b.date) - new Date(a.date));

        // Render Featured Post
        const featured = posts[0];
        const featuredImgHtml = featured.image
            ? `<img src="${featured.image}" alt="${featured.title}" style="width:100%; height:100%; object-fit:${featured.contain ? 'contain; background:white' : 'cover'};">`
            : `IMAGE PLACEHOLDER`;

        featuredContainer.innerHTML = `
      <div class="featured-post" onclick="window.location.href='${featured.link}'">
        <div class="featured-meta">
          <span class="category-label">${featured.category}</span>
          <span class="post-time">${formatTime(featured.date)}</span>
        </div>
        <div class="placeholder-img">${featuredImgHtml}</div>
        <h2 class="featured-title">${featured.title}</h2>
      </div>
    `;

        // Render Grid Posts
        const gridItems = posts.slice(1, 4);
        gridContainer.innerHTML = gridItems.map(post => {
            const imgHtml = post.image
                ? `<img src="${post.image}" alt="${post.title}" style="width:100%; height:100%; object-fit:${post.contain ? 'contain; background:white' : 'cover'};">`
                : `IMAGE PLACEHOLDER`;

            return `
                <div class="grid-post" onclick="window.location.href='${post.link}'">
                    <div class="grid-post-meta">
                        <span class="category-label">${post.category}</span>
                        <span class="post-time">${formatTime(post.date)}</span>
                    </div>
                    <div class="placeholder-img">${imgHtml}</div>
                    <h3 class="grid-post-title">${post.title}</h3>
                </div>
            `;
        }).join('');

        // --- LOGBOOK RENDERING ---
        const logbookEntries = [
            {
                date: "2026-04-17",
                title: "Wind Tunnel Session #42",
                category: "Test Log",
                desc: "Observed unexpected vortex shedding at the trailing edge. Recalibrating sensors for tomorrow."
            },
            {
                date: "2026-04-16",
                title: "Propulsion Efficiency Update",
                category: "System Log",
                desc: "Modified the throttle curve to improve low-end response. 5% reduction in perceived vibration."
            },
            {
                date: "2026-04-15",
                title: "Navigation Logic Debug",
                category: "Code Log",
                desc: "Fixed a race condition in the telemetry buffer. Data dropout reduced by 90%."
            }
        ];

        const logbookContainer = document.getElementById("logbookContainer");
        if (logbookContainer) {
            logbookContainer.innerHTML = logbookEntries.map(entry => `
      <div class="research-item">
        <div class="item-meta-row">
          <span class="research-badge">${entry.category}</span>
          <p class="item-meta">${entry.date}</p>
        </div>
        <h3 class="item-title">${entry.title}</h3>
        <p class="item-desc">${entry.desc}</p>
      </div>
    `).join('');
        }

        // --- REVEAL ON SCROLL ---
        const observerOptions = {
            threshold: 0.05,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.reveal').forEach(el => {
            observer.observe(el);
        });
    </script>
